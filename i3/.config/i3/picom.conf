# Backend
backend = "glx";

# Rounded corners (removed detect-rounded-corners - deprecated in v12.5)
corner-radius = 9;

# Transparency
active-opacity = 0.9;
inactive-opacity = 0.8;
frame-opacity = 0.8;

# Blur (FIXED - uncommented and using v12.5 compatible method)
blur-background = true;
blur-method = "box";        # v12.5 supports: none, box, gaussian, kernel
blur-size = 10;             # Required for box/gaussian methods

# Exclude from rounded corners
rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'Polybar'",
    "class_g = 'slop'",
    "class_g = 'maim'",
];

# Shadow
shadow = true;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.4;

shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
    "window_type = 'dock'",
];

# FIXED: Blur exclude - Firefox uses lowercase 'firefox' and needs argb check
blur-background-exclude = [
    "class_g = 'firefox'",
    "class_g = 'firefox-esr'",
    "class_g = 'Firefox'",
    "name *= 'firefox'",
    "class_g = 'zen'",
    "class_g = 'Zen'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# VSync
vsync = true;

# Performance
use-damage = true;
