# Backend
backend = "glx";

# Rounded corners
corner-radius = 9;

# NO global transparency
# active-opacity = 1.0;  (default, no need to set)
# inactive-opacity = 1.0;

# Per-app opacity rules
opacity-rule = [
    "85:class_g = 'Alacritty'",
    "85:class_g = 'alacritty'",
    "90:class_g = 'Rofi'",
];

# Blur only for terminals
blur-background = true;
blur-method = "box";
blur-size = 10;
blur-background-exclude = [
    "class_g != 'Alacritty' && class_g != 'alacritty' && class_g != 'Rofi'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@"
];

# Rounded corners exclude
rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'Polybar'",
    "class_g = 'slop'",
    "class_g = 'maim'",
];

# Shadow
shadow = true;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.4;
shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
    "window_type = 'dock'",
];

# VSync
vsync = true;
use-damage = true;
