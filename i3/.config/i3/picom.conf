# Backend
backend = "glx";

# Required for rounded corners
corner-radius = 8;
detect-rounded-corners = true;

# for Transparency
active-opacity = 0.9;
inactive-opacity = 0.8;
frame-opacity = 0.8;

# Enable background blur (optional, looks good with transparency)
blur-method = "gaussian";
blur-size = 10;

# END


# Or exclude only specific windows if needed:
rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'Polybar'",
];

# Shadow (helps see the rounded effect)
shadow = true;
# shadow-radius = 12;
# shadow-opacity = 0.4;
# shadow-offset-x = -5;
# shadow-offset-y = -5;

shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -10;

# Exclude bars from shadows only
shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
    "window_type = 'dock'",
];

# VSync
vsync = true;

# Performance
use-damage = true;
